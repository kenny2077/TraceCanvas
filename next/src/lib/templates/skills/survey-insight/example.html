<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Survey Insight Report</title>
<style>
  :root { --primary:#7c3aed; --bg:#f8fafc; --card:#fff; --text:#0f172a; --muted:#64748b; --good:#10b981; --bad:#ef4444; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background:var(--bg); color:var(--text); padding:24px; }
  .container { max-width:960px; margin:0 auto; }
  h1 { font-size:24px; margin-bottom:4px; }
  .subtitle { color:var(--muted); font-size:14px; margin-bottom:20px; }
  .section { background:var(--card); border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 1px 2px rgba(0,0,0,.05); }
  .section h2 { font-size:16px; margin-bottom:12px; color:var(--primary); }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  th, td { padding:10px 12px; text-align:left; font-size:14px; }
  th { background:#f1f5f9; font-weight:600; color:var(--muted); font-size:12px; }
  tr:not(:last-child) td { border-bottom:1px solid #f1f5f9; }
  .score { font-weight:700; }
  .score.high { color:var(--good); }
  .score.low { color:var(--bad); }
  blockquote { border-left:3px solid var(--primary); padding-left:12px; margin:12px 0; color:var(--muted); font-style:italic; }
  .findings { list-style:none; }
  .findings li { padding:8px 0; border-bottom:1px dashed #e2e8f0; }
  .findings li:last-child { border-bottom:none; }
</style>
</head>
<body>
<div class="container">
  <h1>Employee Engagement Survey</h1>
  <p class="subtitle">4 departments · 70 respondents · Q1 2025</p>

  <div class="section">
    <h2>Scores by Department</h2>
    <table>
      <thead>
        <tr><th>Department</th><th>Engagement</th><th>Recognition</th><th>Growth</th></tr>
      </thead>
      <tbody>
        <tr>
          <td>Engineering</td><!-- pf-src: rows[].department -->
          <td class="score">4.2</td><!-- pf-src: rows[].engagement -->
          <td class="score">3.9</td><!-- pf-src: rows[].recognition -->
          <td class="score high">4.5</td><!-- pf-src: rows[].growth -->
        </tr>
        <tr>
          <td>Design</td><!-- pf-src: rows[].department -->
          <td class="score high">4.7</td><!-- pf-src: rows[].engagement -->
          <td class="score">4.1</td><!-- pf-src: rows[].recognition -->
          <td class="score">4.0</td><!-- pf-src: rows[].growth -->
        </tr>
      </tbody>
    </table>
  </div>

  <div class="section">
    <h2>Key Findings</h2>
    <ul class="findings">
      <li>Design has the highest engagement score at 4.7.</li><!-- pf-derived -->
      <li>Engineering reports strong growth opportunities (4.5).</li><!-- pf-derived -->
    </ul>
  </div>
</div>
</body>
</html>
