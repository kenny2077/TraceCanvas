<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Data Brief</title>
<style>
  :root { --primary:#2563eb; --bg:#f8fafc; --card:#fff; --text:#0f172a; --muted:#64748b; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background:var(--bg); color:var(--text); padding:24px; }
  .container { max-width:960px; margin:0 auto; }
  h1 { font-size:24px; margin-bottom:4px; }
  .subtitle { color:var(--muted); font-size:14px; margin-bottom:20px; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
  .kpi { background:var(--card); border-radius:12px; padding:16px; box-shadow:0 1px 2px rgba(0,0,0,.05); }
  .kpi-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .kpi-value { font-size:28px; font-weight:700; color:var(--primary); margin-top:4px; }
  table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.05); }
  th, td { padding:12px 16px; text-align:left; font-size:14px; }
  th { background:#f1f5f9; font-weight:600; color:var(--muted); font-size:12px; text-transform:uppercase; }
  tr:not(:last-child) td { border-bottom:1px solid #f1f5f9; }
  .text-right { text-align:right; }
</style>
</head>
<body>
<div class="container">
  <h1>Department Performance Brief</h1>
  <p class="subtitle">Q1 2025 · 4 departments</p>

  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label">Average Score</div>
      <div class="kpi-value">4.30</div><!-- pf-derived -->
    </div>
    <div class="kpi">
      <div class="kpi-label">Total Headcount</div>
      <div class="kpi-value">70</div><!-- pf-derived -->
    </div>
    <div class="kpi">
      <div class="kpi-label">Highest Score</div>
      <div class="kpi-value">4.7</div><!-- pf-src: rows[].score -->
    </div>
    <div class="kpi">
      <div class="kpi-label">Lowest Score</div>
      <div class="kpi-value">3.8</div><!-- pf-src: rows[].score -->
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Department</th>
        <th class="text-right">Score</th>
        <th class="text-right">Headcount</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Engineering</td><!-- pf-src: rows[].department -->
        <td class="text-right">4.2</td><!-- pf-src: rows[].score -->
        <td class="text-right">32</td><!-- pf-src: rows[].headcount -->
      </tr>
      <tr>
        <td>Design</td><!-- pf-src: rows[].department -->
        <td class="text-right">4.7</td><!-- pf-src: rows[].score -->
        <td class="text-right">12</td><!-- pf-src: rows[].headcount -->
      </tr>
      <tr>
        <td>Marketing</td><!-- pf-src: rows[].department -->
        <td class="text-right">3.8</td><!-- pf-src: rows[].score -->
        <td class="text-right">18</td><!-- pf-src: rows[].headcount -->
      </tr>
      <tr>
        <td>Product</td><!-- pf-src: rows[].department -->
        <td class="text-right">4.5</td><!-- pf-src: rows[].score -->
        <td class="text-right">8</td><!-- pf-src: rows[].headcount -->
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
